apiVersion: v1
kind: Service
metadata:
  name: app-service
  namespace: default
spec:
  # NodePort exposes this service on every cluster node — no restriction
  type: NodePort
  selector:
    app: vulnerable-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080
---
# No NetworkPolicy — all pod-to-pod traffic is allowed by default
apiVersion: v1
kind: Service
metadata:
  name: db-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
